<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .double { animation: pulse 0.5s infinite alternate ease-in-out; transform-origin: center; }
    @keyframes pulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.2); }
    }
  </style>
  <g className="double">
    <circle cx="30" cy="50" r="20" fill="#FFD700" opacity="0.8" />
    <circle cx="70" cy="50" r="20" fill="#FFD700" opacity="0.8" />
    <path d="M 20 50 L 80 50" fill="none" stroke="#FFF" stroke-width="5" />
    <path d="M 50 20 L 50 80" fill="none" stroke="#FFF" stroke-width="5" />
  </g>
</svg>
