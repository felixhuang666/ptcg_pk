<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .dig { animation: spin 1s infinite linear; transform-origin: center; }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <g className="dig">
    <polygon points="50,20 80,80 20,80" fill="#8B4513" />
    <polygon points="50,30 70,70 30,70" fill="#A0522D" />
  </g>
</svg>
