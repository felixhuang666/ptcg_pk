<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .fireball { animation: shoot 1s infinite linear; transform-origin: center; }
    @keyframes shoot {
      0% { transform: translateX(-20px) scale(0.8); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateX(20px) scale(1.2); opacity: 0; }
    }
  </style>
  <g className="fireball">
    <circle cx="50" cy="50" r="20" fill="#FF4500" />
    <circle cx="45" cy="50" r="15" fill="#FF8C00" />
    <circle cx="40" cy="50" r="10" fill="#FFD700" />
    <path d="M 20 40 Q 50 50 20 60" fill="#FF4500" />
  </g>
</svg>
