<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .dodge { animation: fade 1s infinite alternate ease-in-out; transform-origin: center; }
    @keyframes fade {
      0% { opacity: 1; transform: translateX(-10px); }
      100% { opacity: 0.2; transform: translateX(10px); }
    }
  </style>
  <g className="dodge">
    <circle cx="50" cy="50" r="30" fill="none" stroke="#ADD8E6" stroke-width="5" stroke-dasharray="10,5" />
    <path d="M 30 50 Q 50 20 70 50" fill="none" stroke="#ADD8E6" stroke-width="3" />
  </g>
</svg>
