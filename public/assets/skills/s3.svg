<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .crazy { animation: shake 0.1s infinite alternate ease-in-out; transform-origin: center; }
    @keyframes shake {
      0% { transform: translateX(-2px) translateY(-2px); }
      100% { transform: translateX(2px) translateY(2px); }
    }
  </style>
  <g className="crazy">
    <path d="M 10 30 L 25 50 L 40 30 L 55 50 L 70 30 L 85 50" fill="none" stroke="#FF0000" stroke-width="8" />
    <path d="M 10 70 L 25 50 L 40 70 L 55 50 L 70 70 L 85 50" fill="none" stroke="#FF0000" stroke-width="8" />
  </g>
</svg>
