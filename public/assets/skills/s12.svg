<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .waterpillar { animation: splash 1s infinite alternate ease-in-out; transform-origin: bottom; }
    @keyframes splash {
      0% { transform: scaleY(0.8); opacity: 0.8; }
      100% { transform: scaleY(1.2); opacity: 1; }
    }
  </style>
  <g className="waterpillar">
    <rect x="35" y="20" width="30" height="80" fill="#00BFFF" />
    <rect x="45" y="30" width="10" height="70" fill="#E0FFFF" />
    <circle cx="50" cy="20" r="15" fill="#00BFFF" />
    <circle cx="40" cy="30" r="10" fill="#1E90FF" />
    <circle cx="60" cy="30" r="10" fill="#1E90FF" />
  </g>
</svg>
