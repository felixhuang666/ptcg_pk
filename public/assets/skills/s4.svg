<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .claw { animation: swipe 0.5s infinite alternate ease-in-out; transform-origin: center; }
    @keyframes swipe {
      0% { transform: translateX(-10px) translateY(-10px); }
      100% { transform: translateX(10px) translateY(10px); }
    }
  </style>
  <g className="claw">
    <path d="M 20 20 Q 50 50 80 80" fill="none" stroke="#FFF" stroke-width="5" />
    <path d="M 30 10 Q 60 40 90 70" fill="none" stroke="#FFF" stroke-width="5" />
    <path d="M 10 30 Q 40 60 70 90" fill="none" stroke="#FFF" stroke-width="5" />
  </g>
</svg>
