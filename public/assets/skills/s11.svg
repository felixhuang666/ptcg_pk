<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .watergun { animation: squirt 0.5s infinite linear; transform-origin: left; }
    @keyframes squirt {
      0% { transform: scaleX(0); opacity: 1; }
      100% { transform: scaleX(1); opacity: 0; }
    }
  </style>
  <g className="watergun">
    <path d="M 10 50 Q 50 40 90 50" fill="none" stroke="#00BFFF" stroke-width="8" stroke-linecap="round" />
    <path d="M 10 50 Q 50 60 90 50" fill="none" stroke="#1E90FF" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
