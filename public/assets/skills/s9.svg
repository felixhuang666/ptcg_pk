<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .pillar { animation: erupt 0.8s infinite alternate ease-in-out; transform-origin: bottom; }
    @keyframes erupt {
      0% { transform: scaleY(0.5); opacity: 0.5; }
      100% { transform: scaleY(1.5); opacity: 1; }
    }
  </style>
  <g className="pillar">
    <rect x="30" y="20" width="40" height="80" fill="#FF4500" />
    <rect x="40" y="30" width="20" height="70" fill="#FFD700" />
    <path d="M 30 20 Q 50 0 70 20 Z" fill="#FF4500" />
  </g>
</svg>
