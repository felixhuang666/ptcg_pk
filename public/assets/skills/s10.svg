<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .shell { animation: protect 2s infinite alternate ease-in-out; transform-origin: center; }
    @keyframes protect {
      0% { transform: scale(1); }
      100% { transform: scale(1.1); }
    }
  </style>
  <g className="shell">
    <ellipse cx="50" cy="50" rx="40" ry="30" fill="#2E8B57" />
    <path d="M 20 50 Q 50 20 80 50 Z" fill="#006400" />
    <path d="M 30 40 L 40 30 L 50 40 L 60 30 L 70 40" fill="none" stroke="#3CB371" stroke-width="3" />
  </g>
</svg>
