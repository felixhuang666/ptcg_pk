<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .wolf { animation: wind 1.5s infinite alternate ease-in-out; transform-origin: center; }
    @keyframes wind {
      0% { transform: translateX(-5px) skewX(5deg); }
      100% { transform: translateX(5px) skewX(-5deg); }
    }
  </style>
  <g className="wolf">
    <ellipse cx="50" cy="60" rx="25" ry="15" fill="#708090" />
    <circle cx="30" cy="50" r="15" fill="#778899" />
    <polygon points="20,40 25,25 35,38" fill="#778899" />
    <polygon points="35,38 40,25 45,40" fill="#778899" />
    <circle cx="25" cy="45" r="3" fill="#FFF" />
    <circle cx="25" cy="45" r="1" fill="#000" />
    <path d="M 75 60 Q 90 50 85 70" fill="none" stroke="#708090" stroke-width="4" />
    <path d="M 10 70 Q 50 80 90 70" fill="none" stroke="#ADD8E6" stroke-width="2" stroke-dasharray="5,5" opacity="0.5" />
  </g>
</svg>
