name: Post-Merge Checks

on:
  push:
    branches: [main]
  workflow_dispatch:      # 也可以手動 trigger

jobs:
  test:
    runs-on: [self-hosted, linux]  # 使用你的 self-hosted runner labels
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt

      - name: Run Tests
        run: |
          make setup stop build bg-start test
