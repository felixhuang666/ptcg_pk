<svg version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
	 width="254px" height="235px" viewBox="0 0 508 469" xml:space="preserve">
<style>
    /* 尾巴擺動動畫 */
    @keyframes tailWag {
        0% { transform: rotate(0deg); }
        50% { transform: rotate(10deg); }
        100% { transform: rotate(0deg); }
    }
    
    /* 眨眼動畫：每 4 秒眨一次 */
    @keyframes blink {
        0%, 90%, 100% { transform: scaleY(1); }
        95% { transform: scaleY(0.1); } /* 快速閉合 */
    }

    .tail-group {
        transform-origin: 415px 430px;
        animation: tailWag 1.5s ease-in-out infinite;
    }

    .eyes-group {
        /* 設定旋轉/縮放中心在眼睛的中間位置 (約 y=200) */
        transform-origin: 250px 200px;
        animation: blink 4s infinite;
    }
</style>

